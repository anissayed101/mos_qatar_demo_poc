# ==============================================================
# mos_qatar_demo.ini
# Qatar Ministry of Sports - Unstructured Data Pipeline Demo
# Master Configuration File
# All scripts read from this single config. Do not hardcode paths.
# ==============================================================

[paths]
# Local Linux paths - all on cdp-master1 (node 131) only
local_base     = /home/cloudera/mos_qatar_demo_poc
local_landing  = /home/cloudera/mos_qatar_demo_poc/landing
local_archive  = /home/cloudera/mos_qatar_demo_poc/archive
local_logs     = /home/cloudera/mos_qatar_demo_poc/logs
local_metadata = /home/cloudera/mos_qatar_demo_poc/metadata

[hdfs]
# HDFS paths - no trailing slashes
namenode_uri   = hdfs://cdp-master1.cloudera.bbi:8020
hdfs_raw       = /data/mos_qatar_demo/text_files/raw
hdfs_gold      = /data/mos_qatar_demo/text_files/gold
hdfs_metadata  = /data/mos_qatar_demo/text_files/metadata

[hive]
# Hive connectivity
metastore_uris = thrift://cdp-master2.cloudera.bbi:9083,thrift://cdp-master3.cloudera.bbi:9083
beeline_url    = jdbc:hive2://cdp-master1.cloudera.bbi:2181,cdp-master2.cloudera.bbi:2181,cdp-master3.cloudera.bbi:2181/default;serviceDiscoveryMode=zooKeeper;zooKeeperNamespace=hiveserver2
database       = mos_qatar_demo
raw_table      = sports_unstructured_raw
gold_table     = sports_events_gold

[spark]
# Spark job settings
master               = yarn
deploy_mode          = client
app_name_ingest      = MOS_Qatar_Raw_Ingestion
app_name_transform   = MOS_Qatar_Gold_Transform
executor_memory      = 1g
executor_cores       = 1
num_executors        = 2

[files]
# File handling
file_pattern       = *.txt
archive_processed  = true

[tracking]
# Local idempotency tracking - one filename per line
ingested_log  = /home/cloudera/mos_qatar_demo_poc/metadata/ingested_files.log
processed_log = /home/cloudera/mos_qatar_demo_poc/metadata/processed_files.log
