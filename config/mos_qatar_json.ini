# ==============================================================
# mos_qatar_json.ini
# Qatar Ministry of Sports - JSON Data Pipeline Demo
# Master Configuration File - JSON Pipeline
# ==============================================================

[paths]
# Local Linux paths - all on cdp-master1 only
local_base     = /home/cloudera/mos_qatar_demo_poc
local_landing  = /home/cloudera/mos_qatar_demo_poc/landing_json
local_archive  = /home/cloudera/mos_qatar_demo_poc/archive_json
local_logs     = /home/cloudera/mos_qatar_demo_poc/logs
local_metadata = /home/cloudera/mos_qatar_demo_poc/metadata

[hdfs]
namenode_uri   = hdfs://cdp-master1.cloudera.bbi:8020
hdfs_raw       = /data/mos_qatar_demo/json_files/raw
hdfs_gold      = /data/mos_qatar_demo/json_files/gold
hdfs_metadata  = /data/mos_qatar_demo/json_files/metadata

[hive]
metastore_uris = thrift://cdp-master2.cloudera.bbi:9083,thrift://cdp-master3.cloudera.bbi:9083
beeline_url    = jdbc:hive2://cdp-master1.cloudera.bbi:2181,cdp-master2.cloudera.bbi:2181,cdp-master3.cloudera.bbi:2181/default;serviceDiscoveryMode=zooKeeper;zooKeeperNamespace=hiveserver2
database       = mos_qatar_demo
raw_table      = sports_unstructured_raw_json
gold_table     = sports_events_gold_json

[spark]
master               = yarn
deploy_mode          = client
app_name_ingest      = MOS_Qatar_JSON_Raw_Ingestion
app_name_transform   = MOS_Qatar_JSON_Gold_Transform
executor_memory      = 1g
executor_cores       = 1
num_executors        = 2

[files]
file_pattern       = *.json
archive_processed  = true

[tracking]
ingested_log  = /home/cloudera/mos_qatar_demo_poc/metadata/ingested_files_json.log
processed_log = /home/cloudera/mos_qatar_demo_poc/metadata/processed_files_json.log
